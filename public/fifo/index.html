<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Rotation" />
  <meta name="theme-color" content="#f5a623" />
  <meta name="msapplication-TileColor" content="#0d0f12" />
  <meta name="msapplication-TileImage" content="icon-192.png" />
  <title>Rotation — Work today. Home tomorrow.</title>
  <meta name="description" content="Rotation — the premium countdown app for FIFO workers. Work today. Home tomorrow." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="styles.css?v=rotation-travel-saved-2026-07-22a" />
</head>
<body>

  <!-- ══ SPLASH ══════════════════════════════════════════════ -->
  <div id="splash" aria-hidden="true">
    <div class="splash-corner tl"></div>
    <div class="splash-corner tr"></div>
    <div class="splash-corner bl"></div>
    <div class="splash-corner br"></div>
    <div class="splash-badge">Rotation App</div>
    <div class="splash-icon">✈️</div>
    <div class="splash-title">Rotation</div>
    <div class="splash-tagline">Work today. Home tomorrow.</div>
    <div class="splash-bar-wrap"><div class="splash-bar-fill"></div></div>
    <div class="splash-loading-label">Loading&hellip;</div>
  </div>

  <!-- ══ WAKE-UP ALERT ═══════════════════════════════════════ -->
  <div id="alarm-alert" role="alertdialog" aria-modal="true">
    <div class="alarm-alert-icon">⏰</div>
    <div class="alarm-alert-title">Wake up<br />legend</div>
    <div class="alarm-alert-sub">Time to get moving mate</div>
    <div class="alarm-alert-btns">
      <button class="stop-alarm-btn" data-action="stop-alarm">✅ &nbsp;I'M UP</button>
      <button class="snooze-alarm-btn" data-action="snooze-alarm">😴 &nbsp;Snooze</button>
    </div>
    <div class="alarm-alert-time" id="alarm-alert-time"></div>
  </div>

  <!-- ══ BEDTIME OVERLAY ════════════════════════════════════ -->
  <div id="bedtime-overlay" data-action="disable-bedtime">
    <div class="bedtime-title">Bedtime Mode Active</div>
    <div class="bedtime-sub">Screen Wake Lock is active. Tap anywhere to exit.</div>
  </div>

  <!-- ══ REMINDER ALERT ═════════════════════════════════════ -->
  <div id="reminder-alert" role="alertdialog" aria-modal="true">
    <div class="alarm-alert-icon">📅</div>
    <div class="alarm-alert-title" id="reminder-alert-title">Reminder</div>
    <div class="alarm-alert-sub" id="reminder-alert-sub"></div>
    <div class="alarm-alert-btns">
      <button class="stop-alarm-btn" data-action="dismiss-reminder">✅ &nbsp;Got it</button>
    </div>
    <div class="alarm-alert-time" id="reminder-alert-time"></div>
  </div>

  <!-- ══ APP ═════════════════════════════════════════════════ -->
  <div id="app-wrapper">
    <header>
      <div class="logo">Rotation</div>
      <div class="header-actions">
        <button class="settings-btn music-btn" data-action="open-spotify" aria-label="Open Spotify">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.586 14.424a.623.623 0 01-.857.207c-2.348-1.435-5.304-1.76-8.785-.964a.623.623 0 01-.277-1.215c3.809-.87 7.076-.496 9.712 1.115a.623.623 0 01.207.857zm1.223-2.722a.78.78 0 01-1.072.257c-2.687-1.652-6.785-2.131-9.965-1.166a.78.78 0 01-.973-.519.781.781 0 01.519-.972c3.632-1.102 8.147-.568 11.234 1.328a.78.78 0 01.257 1.072zm.105-2.835C14.692 8.95 9.375 8.775 6.297 9.71a.937.937 0 11-.543-1.794c3.532-1.072 9.404-.865 13.115 1.338a.937.937 0 01-.955 1.613z"/>
          </svg>
          <span>Music</span>
        </button>
        <button class="settings-btn alarm-btn" id="alarm-hero-btn" data-action="toggle-bedtime" aria-label="Alarm — tap for bedtime mode, long-press to set alarm">
          <span>Alarm</span>
        </button>
      </div>
    </header>

    <main id="main-content"></main>

    <div class="overlay" id="overlay">
      <div class="panel" id="settings-panel"><!-- injected by JS --></div>
    </div>
  </div>

  <script src="app.js?v=rotation-travel-saved-2026-07-22a" defer></script>

  <!-- ══ OFFLINE STATUS PILL ══════════════════════════════════ -->
  <div id="offline-pill" role="status" aria-live="polite" hidden>Offline</div>
  <style>
    #offline-pill {
      position: fixed;
      left: 50%;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 14px);
      transform: translateX(-50%) translateY(8px);
      z-index: 9999;
      padding: 7px 14px;
      font: 500 12px/1 'Inter', system-ui, sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #ffd7d7;
      background: rgba(20, 10, 12, 0.72);
      border: 1px solid rgba(255, 90, 90, 0.45);
      border-radius: 999px;
      backdrop-filter: blur(14px) saturate(140%);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      box-shadow: 0 6px 20px rgba(255, 60, 60, 0.18), 0 0 0 1px rgba(255,90,90,0.08) inset;
      opacity: 0;
      pointer-events: none;
      transition: opacity .28s ease, transform .28s ease;
    }
    #offline-pill[data-visible="true"] {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    #offline-pill::before {
      content: '';
      display: inline-block;
      width: 7px; height: 7px;
      margin-right: 8px;
      border-radius: 50%;
      background: #ff5a5a;
      box-shadow: 0 0 8px #ff5a5a;
      vertical-align: middle;
    }
  </style>
  <script>
    // Offline status pill
    (function () {
      var pill = document.getElementById('offline-pill');
      function update() {
        var offline = !navigator.onLine;
        pill.hidden = false;
        pill.dataset.visible = offline ? 'true' : 'false';
      }
      window.addEventListener('online', update);
      window.addEventListener('offline', update);
      update();
    })();

    // Service worker registration — auto-update on reconnect
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').then(function (reg) {
          // Check for updates when we come back online
          window.addEventListener('online', function () { reg.update(); });
          reg.addEventListener('updatefound', function () {
            var nw = reg.installing;
            if (!nw) return;
            nw.addEventListener('statechange', function () {
              if (nw.state === 'installed' && navigator.serviceWorker.controller) {
                nw.postMessage('SKIP_WAITING');
              }
            });
          });
          var reloaded = false;
          navigator.serviceWorker.addEventListener('controllerchange', function () {
            if (reloaded) return;
            reloaded = true;
            window.location.reload();
          });
        }).catch(function () { /* ignore */ });
      });
    }
  </script>
</body>
</html>
